<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG // LOCAL_SEARCH</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --accent: #58a6ff;
            --border: #30363d;
            --code-bg: #0d1117;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 800px;
            max-width: 90%;
        }
        h1 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex-grow: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            font-size: 16px;
            border-radius: 6px;
            outline: none;
            font-family: monospace;
        }
        input:focus { border-color: var(--accent); }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
        }
        button:hover { opacity: 0.9; }
        
        #results {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .result-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            animation: fadeIn 0.3s ease;
        }
        .meta {
            font-size: 0.85em;
            color: #8b949e;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .filename { color: var(--accent); font-weight: bold; }
        pre {
            background: var(--code-bg);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid var(--border);
            margin: 0;
            white-space: pre-wrap;
            color: #a5d6ff;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Local Code Search</h1>
    
    <div class="search-box">
        <input type="text" id="query" placeholder="Ask your codebase..." onkeypress="handleEnter(event)">
        <button onclick="performSearch()">Search</button>
    </div>

    <div id="results"></div>
</div>

<script>
    async function performSearch() {
        const query = document.getElementById('query').value;
        const resultsDiv = document.getElementById('results');
        
        if (!query) return;

        resultsDiv.innerHTML = '<div style="text-align:center; color:#8b949e;">Scanning vector database...</div>';

        try {
            const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();

            resultsDiv.innerHTML = '';

            // 1. Show AI Answer Box
            if (data.answer) {
                const aiDiv = document.createElement('div');
                aiDiv.style.background = "#1f2937"; // Darker blue-grey
                aiDiv.style.border = "1px solid #58a6ff";
                aiDiv.style.borderRadius = "8px";
                aiDiv.style.padding = "20px";
                aiDiv.style.marginBottom = "25px";
                aiDiv.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
                
                // Markdown-ish formatting for code blocks in answer
                let formattedAnswer = escapeHtml(data.answer).replace(/\n/g, '<br>');
                
                aiDiv.innerHTML = `
                    <h3 style="margin-top:0; color:#58a6ff;">🤖 AI Answer:</h3>
                    <div style="line-height: 1.6; color: #e6edf3;">${formattedAnswer}</div>
                `;
                resultsDiv.appendChild(aiDiv);
            }

            // 2. Show Source Evidence
            if (!data.results || data.results.length === 0) {
                // ... (keep existing "No matches" logic)
            } else {
                const divider = document.createElement('div');
                divider.innerHTML = '<h4 style="color:#8b949e; margin-bottom:10px;">Reference Sources:</h4>';
                resultsDiv.appendChild(divider);

                data.results.forEach(item => {
                   // ... (keep existing card creation logic) ...
                   // (Paste the previous card logic here)
                   const card = document.createElement('div');
                   card.className = 'result-card';
                   const filename = item.Metadata ? item.Metadata.filename : "Unknown File";
                   const type = item.Metadata ? item.Metadata.type : "text";
                   card.innerHTML = `
                       <div class="meta">
                           <span class="filename">📄 ${filename}</span>
                           <span>${type}</span>
                       </div>
                       <pre>${escapeHtml(item.Text)}</pre>
                   `;
                   resultsDiv.appendChild(card);
                });
            }
        } catch (error) {
            resultsDiv.innerHTML = `<div style="color: #ff6b6b; text-align: center;">Error: ${error.message}</div>`;
        }
    }

    function handleEnter(e) {
        if (e.key === 'Enter') performSearch();
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>

</body>
</html>
